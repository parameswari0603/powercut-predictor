<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Report Outage</title>
    <link rel="stylesheet" href=
            "https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background:#0d0d1a; color:#fff; }
        .card { background:#1a1a2e;
            border:1px solid #333; color:#fff; }
        .form-control {
            background:#0d0d1a; color:#fff;
            border-color:#444;
        }
        .nav-link { color:#ccc !important; }
        .nav-link:hover { color:#f5c518 !important; }
    </style>
</head>
<body>

<!-- Shared Navbar -->
<div th:replace="~{navbar :: navbar}"></div>

<div class="container mt-5"
     style="max-width:600px">
    <h2 class="my-4">⚡ Report a Power Cut</h2>

    <div th:if="${success}"
         class="alert alert-success"
         th:text="${success}">
    </div>
    <div th:if="${error}"
         class="alert alert-danger"
         th:text="${error}">
    </div>

    <div class="card p-4">
        <form action="/report" method="post">
            <div class="mb-3">
                <label class="form-label">Area Name</label>
                <input type="text" name="areaName"
                       class="form-control"
                       placeholder="e.g. Anna Nagar"
                       required>
            </div>
            <div class="mb-3">
                <label class="form-label">
                    When did it start?
                </label>
                <input type="datetime-local"
                       name="startTime"
                       class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">
                    When did power return? (optional)
                </label>
                <input type="datetime-local"
                       name="endTime"
                       class="form-control">
            </div>
            <button type="submit"
                    class="btn btn-warning w-100 py-2">
                Submit Report
            </button>
        </form>
    </div>
</div>

<script src=
                "https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
</script>
</body>
</html>
