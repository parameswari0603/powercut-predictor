<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href=
            "https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background:#0d0d1a; color:#fff; }
        .card { background:#1a1a2e;
            border:1px solid #333; color:#fff; }
        .stat-card { border-left:4px solid #f5c518; }
    </style>
</head>
<body>
<div th:replace="~{navbar :: navbar}"></div>
    <div class="container">
        <a href="/" class="navbar-brand fw-bold">
            ⚡ PowerCut Predictor
        </a>
        <span class="text-warning">Admin Dashboard</span>
    </div>


<div class="container mt-4">
    <h2 style="color:#f5c518;">
        🛠️ Admin Dashboard
    </h2>

    <!-- Stats Row -->
    <div class="row g-3 mb-4">
        <div class="col-md-3">
            <div class="card p-3 stat-card">
                <small class="text-muted">Total Reports</small>
                <h3 th:text="${totalReports}">0</h3>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card p-3 stat-card">
                <small class="text-muted">Total Areas</small>
                <h3 th:text="${totalAreas}">0</h3>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card p-3 stat-card">
                <small class="text-muted">
                    Reports Today
                </small>
                <h3 th:text="${reportsToday}">0</h3>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card p-3 stat-card">
                <small class="text-muted">Active Areas</small>
                <h3 th:text="${activeAreas}">0</h3>
            </div>
        </div>
    </div>

    <!-- Recent Reports Table -->
    <div class="card p-4">
        <h5 style="color:#f5c518;">
            Recent Reports
        </h5>
        <table class="table table-dark mt-3">
            <thead>
            <tr>
                <th>ID</th>
                <th>Area</th>
                <th>Start Time</th>
                <th>Temperature</th>
                <th>Day Type</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="report : ${recentReports}">
                <td th:text="${report.id}"></td>
                <td th:text="${report.area.name}"></td>
                <td th:text="${report.startTime}"></td>
                <td th:text="${report.temperatureAtTime}">
                </td>
                <td th:text="${report.dayType}"></td>
                <td>
                    <a th:href=
                               "@{/admin/delete/{id}(id=${report.id})}"
                       class="btn btn-sm btn-danger"
                       onclick="return confirm(
                 'Delete this report?')">
                        Delete
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
